# Approximate IMU configuration for first Kalibr trial.
# The CSV produced by this project stores acceleration in m/s^2 and gyro in deg/s.
# The bag conversion script converts gyro to rad/s for sensor_msgs/Imu.
rostopic: /imu0
update_rate: 247.0
accelerometer_noise_density: 0.02
accelerometer_random_walk: 0.002
gyroscope_noise_density: 0.0035
gyroscope_random_walk: 0.0002
